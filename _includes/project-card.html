<article class="project-card anim-fade-up delay-{{ include.delay }}">
  <div class="project-card-cover {{ include.color }}">
    <span class="project-card-emoji">{{ include.name | slice: 0 }}</span>
    <div class="project-card-badge">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
    </div>
  </div>
  <div class="project-card-body">
    <h3 class="project-card-name">{{ include.name }}</h3>
    <p class="project-card-tagline">{{ include.tagline }}</p>
    <p class="project-card-desc">{{ include.description }}</p>
    <div class="project-card-tech">
      {% assign tech_arr = include.tech | split: "," %}
      {% for tech in tech_arr %}
        {% assign t = tech | strip %}
        <span class="project-tech-tag">{{ t }}</span>
      {% endfor %}
    </div>
    <div class="project-card-footer">
      <div class="project-card-stats">
        <span class="project-stat">
          <span class="project-stat-dot" style="background: {{ include.lang_color }}"></span>
          {{ include.language }}
        </span>
        <span class="project-stat">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 1.5 L10.5 6.5 L16 7.3 L12 11.2 L13 16.7 L8 14 L3 16.7 L4 11.2 L0 7.3 L5.5 6.5 Z"/></svg>
          {{ include.stars }}
        </span>
      </div>
      <a href="{{ include.url }}" class="project-card-link" target="_blank" rel="noopener">
        查看项目
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 4 L12 4 L12 10 M11.5 4.5 L4 12"/></svg>
      </a>
    </div>
  </div>
</article>
